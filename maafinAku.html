<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maafin Aku 💖</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #e5f0ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup {
            background: white;
            width: 90%;
            max-width: 320px;
            border-radius: 20px;
            text-align: center;
            padding: 25px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .popup h2 {
            font-size: 1.4em;
            color: #ff4f91;
            margin-bottom: 10px;
        }

        .popup p {
            color: #444;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
        }

        button {
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .yes {
            background-color: #ff4f91;
            color: white;
            transform: scale(1);
        }

        .no {
            background-color: #ddd;
            color: #555;
        }

        .alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 25px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-size: 1em;
            color: #ff4f91;
            text-align: center;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .alert.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .alert p {
            margin-top: 5px;
            color: #777;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <div class="popup">
        <h2> Aku minta maaf 🥺💖 </h2>
        <p> Aku beneran gak bermaksud bikin kamu kesel. Maafin aku ya? 😢 </p>
        <div class="buttons">
            <button class="yes">Maafin 💞</button>
            <button class="no">Enggak 😠</button>
        </div>
    </div>

    <div class="alert" id="alertBox">
        <h3>Yay! Makasih Udah maafin 😭💗</h3>
        <p> Aku janji ngak bakalan ulangi lagi </p>
    </div>

    <script>
        const yesBtn = document.querySelector('.yes');
        const noBtn = document.querySelector('.no');
        const alertBox = document.getElementById('alertBox');
        let scaleValue = 1;
        let clickCount = 0;

        function showAlert() {
            scaleValue = 1;
            yesBtn.style.transform = 'scale(1)';
            alertBox.classList.add('show');
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 2500);
        }

        noBtn.addEventListener('click', () => {
            clickCount++;
            scaleValue += 0.1;
            yesBtn.style.transform = `scale(1.1)`;
            setTimeout(() => {
                yesBtn.style.transform = `scale(1)`;
            }, 300);

            if (clickCount >= 5) {
                noBtn.textContent = 'Maafin 💞';
                noBtn.classList.remove('no');
                noBtn.classList.add('yes');
                noBtn.style.backgroundColor = '#ff4f91';
                noBtn.style.color = 'white';
                noBtn.addEventListener('click', showAlert);
            }
        });

        yesBtn.addEventListener('click', showAlert);
    </script>

</body>

</html>
